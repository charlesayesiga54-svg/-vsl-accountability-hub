version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vsla-postgres
    environment:
      POSTGRES_DB: vsl_accountability
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/config/database-schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsla-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vsl_accountability
      DB_USER: postgres
      DB_PASSWORD: secure_password_change_me
      JWT_SECRET: your_jwt_secret_key_here
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (optional - usually deployed separately)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vsla-client
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:5000/api

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: vsla-network
